<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>My Photo Slideshow</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        h2 {
            text-align: center;
            margin: 30px 0;
            text-transform: capitalize;
        }

        .carousel {
            max-width: 900px;
            margin: auto;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .carousel-inner .item img {
            width: 100%;
            height: 500px; /* Same height for all images */
            object-fit: cover; /* Makes images fill evenly */
        }

        .carousel-control.left,
        .carousel-control.right {
            background-image: none;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
        }

        footer a {
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>My Photo Slideshow</h2>

    <div class="container">

        <div id="myCarousel" class="carousel slide" data-ride="carousel">

            <!-- Indicators -->
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide-to="1"></li>
                <li data-target="#myCarousel" data-slide-to="2"></li>
                <li data-target="#myCarousel" data-slide-to="3"></li>
            </ol>

            <!-- Slides -->
            <div class="carousel-inner">

                <div class="item active">
                    <img src="images/Rabat_Training.jpg"
                        alt="Rabat Conference 2019">
                </div>

                <div class="item">
                    <img src="images/graduation.JPG"
                        alt="First Degree Graduation">
                </div>

                <div class="item">
                    <img src="images/training2.jpeg"
                        alt="Training Session">
                </div>

                <div class="item">
                    <img src="images/IMG_20230923_141504_HDR.jpg"
                        alt="Working">
                </div>

            </div>

            <!-- Left Control -->
            <a class="left carousel-control"
                href="#myCarousel"
                data-slide="prev">

                <span class="glyphicon glyphicon-chevron-left"></span>
            </a>

            <!-- Right Control -->
            <a class="right carousel-control"
                href="#myCarousel"
                data-slide="next">

                <span class="glyphicon glyphicon-chevron-right"></span>
            </a>

        </div>

    </div>

    <!-- Footer -->
    <footer>
        <hr>

        <p>
            <a href="index.html">Back to My Portal</a>
        </p>
    </footer>

</body>

</html>
